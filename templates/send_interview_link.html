<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Interview Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
        <h2 class="text-3xl font-bold text-center text-indigo-600 mb-6">📧 Send Interview Link</h2>
        
        {% if msg %}
        <div class="mb-4 p-4 rounded {% if 'successfully' in msg %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
            {{ msg }}
        </div>
        {% endif %}
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Candidate Name</label>
                <input type="text" name="name" required 
                       class="w-full px-4 py-2 border-2 border-indigo-300 rounded-lg focus:outline-none focus:border-indigo-500"
                       placeholder="Enter candidate name">
            </div>
            
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Candidate Email</label>
                <input type="email" name="email" required 
                       class="w-full px-4 py-2 border-2 border-indigo-300 rounded-lg focus:outline-none focus:border-indigo-500"
                       placeholder="Enter candidate email">
            </div>
            
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Job Role</label>
                <input type="text" name="job_role" required 
                       class="w-full px-4 py-2 border-2 border-indigo-300 rounded-lg focus:outline-none focus:border-indigo-500"
                       placeholder="e.g., Python Developer">
            </div>
            
            <button type="submit" 
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition font-semibold">
                Send Interview Link 🚀
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="{% url 'admin_home' %}" class="text-indigo-600 hover:underline">← Back to Admin Home</a>
        </div>
    </div>
</body>
</html>
